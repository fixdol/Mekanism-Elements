name: Build and Release

on:
  push:
    branches:
      - "Neo/1.21.1"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Read Version
        id: gradle_props
        run: |
          VERSION=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)
          echo "mod_version=$VERSION" >> $GITHUB_OUTPUT
          echo "release_version=${VERSION}-build.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Create Tag
        run: |
          git tag v${{ steps.gradle_props.outputs.release_version }}
          git push origin v${{ steps.gradle_props.outputs.release_version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.gradle_props.outputs.release_version }}
          name: AE2NoMeteorCraters v${{ steps.gradle_props.outputs.release_version }}
          generate_release_notes: true
          files: |
            build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
